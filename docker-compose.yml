services:
  app:
    build: .
    container_name: medicine_app
    working_dir: /app
    restart: unless-stopped
    volumes:
      - .:/app
    tty: true
    stdin_open: true
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: medicine_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: medicine
      MYSQL_USER: medicine
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: